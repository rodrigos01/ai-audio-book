steps:
  # Step 1: Download the service account key from GCS
  # NOTE: The Cloud Build service account must have 'Storage Object Viewer' permissions on this bucket.
  - name: 'gcr.io/cloud-builders/gsutil'
    args: ['cp', 'gs://${_SECRETS_BUCKET}/ai-audio-book-key.json', 'backend/ai-audio-book-key.json']

  # Step 2: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ai-audio-book'
      - '--build-arg'
      - 'VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}'
      - '--build-arg'
      - 'VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg'
      - 'VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg'
      - 'VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}'
      - '--build-arg'
      - 'VITE_GOOGLE_CLIENT_ID=${_VITE_GOOGLE_CLIENT_ID}'
      - '.'

  # Step 3: Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ai-audio-book']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ai-audio-book'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ai-audio-book'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--execution-environment'
      - 'gen2'
      - '--add-volume'
      - 'name=storage-volume,type=cloud-storage,bucket=ai-audio-book-storage-ai-audio-book'
      - '--add-volume-mount'
      - 'volume=storage-volume,mount-path=/app/storage'
      - '--update-env-vars'
      - 'STORAGE_BASE_PATH=/app/storage,GOOGLE_APPLICATION_CREDENTIALS=/app/backend/ai-audio-book-key.json,NODE_ENV=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID'

  # Step 5: Deploy Sample Generation Job
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'ai-audio-book-generate-samples'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ai-audio-book'
      - '--region'
      - 'us-central1'
      - '--command'
      - 'node'
      - '--args'
      - 'scripts/generate_samples.js'
      - '--add-volume'
      - 'name=storage-volume,type=cloud-storage,bucket=ai-audio-book-storage-ai-audio-book'
      - '--add-volume-mount'
      - 'volume=storage-volume,mount-path=/app/storage'
      - '--update-env-vars'
      - 'STORAGE_BASE_PATH=/app/storage,GOOGLE_APPLICATION_CREDENTIALS=/app/backend/ai-audio-book-key.json,NODE_ENV=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID'

  # Step 6: Execute Sample Generation Job
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'jobs'
      - 'execute'
      - 'ai-audio-book-generate-samples'
      - '--region'
      - 'us-central1'
      - '--wait'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _SECRETS_BUCKET: ''
  _VITE_FIREBASE_API_KEY: ''
  _VITE_FIREBASE_AUTH_DOMAIN: ''
  _VITE_FIREBASE_PROJECT_ID: ''
  _VITE_FIREBASE_STORAGE_BUCKET: ''
  _VITE_FIREBASE_MESSAGING_SENDER_ID: ''
  _VITE_FIREBASE_APP_ID: ''
  _VITE_GOOGLE_CLIENT_ID: ''
